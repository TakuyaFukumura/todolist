<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoリスト</title>
    <!-- 共通CSSフラグメント -->
    <th:block th:replace="fragments/common-css :: commonCss"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- 共通ヘッダー -->
    <th:block th:replace="fragments/header :: header"></th:block>

    <!-- メインコンテンツ -->
    <main class="flex-grow-1 py-4">
        <div class="container">
            <!-- ページタイトル -->
            <div class="row mb-4">
                <div class="col">
                    <h1 class="h2 text-primary mb-0">
                        <i class="bi bi-list-check me-2"></i>ToDoリスト
                    </h1>
                </div>
                <div class="col-auto">
                    <a href="/todos/new" class="btn btn-primary">
                        <i class="bi bi-plus-lg me-1"></i>新しいタスク
                    </a>
                </div>
            </div>

            <!-- 統計情報 -->
            <div class="row mb-4">
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-primary text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${stats.totalTodos}">0</h5>
                            <small>総タスク数</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-success text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${stats.completedTodos}">0</h5>
                            <small>完了済み</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-warning text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${stats.pendingTodos}">0</h5>
                            <small>未開始</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-info text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${stats.inProgressTodos}">0</h5>
                            <small>進行中</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-danger text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${stats.overdueTodos}">0</h5>
                            <small>期限切れ</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-sm-6 mb-2">
                    <div class="card bg-secondary text-white">
                        <div class="card-body p-3 text-center">
                            <h5 class="card-title mb-1" th:text="${#numbers.formatDecimal(stats.completionRate, 1, 1)}">0.0</h5>
                            <small>完了率(%)</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- フィルターとソート -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-funnel me-1"></i><span th:text="${filterDisplay}">フィルター</span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/todos(filter='all', sort=${currentSort}, direction=${currentDirection})}">すべて</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='pending', sort=${currentSort}, direction=${currentDirection})}">未開始</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='in_progress', sort=${currentSort}, direction=${currentDirection})}">進行中</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='completed', sort=${currentSort}, direction=${currentDirection})}">完了</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='high_priority', sort=${currentSort}, direction=${currentDirection})}">高優先度</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='overdue', sort=${currentSort}, direction=${currentDirection})}">期限切れ</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter='due_today', sort=${currentSort}, direction=${currentDirection})}">今日期限</a></li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-sort-down me-1"></i>並び替え
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='dueDate', direction='asc')}">期限日（昇順）</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='dueDate', direction='desc')}">期限日（降順）</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='priority', direction='desc')}">優先度（高→低）</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='priority', direction='asc')}">優先度（低→高）</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='status', direction='asc')}">状態</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='createdAt', direction='desc')}">作成日（新→旧）</a></li>
                            <li><a class="dropdown-item" th:href="@{/todos(filter=${currentFilter}, sort='title', direction='asc')}">タイトル（A→Z）</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- フラッシュメッセージ -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Todoリスト -->
            <div class="row">
                <div class="col">
                    <div th:if="${#lists.isEmpty(todos)}" class="text-center py-5 text-muted">
                        <i class="bi bi-clipboard-x display-1"></i>
                        <h3>タスクがありません</h3>
                        <p>新しいタスクを作成してみましょう！</p>
                        <a href="/todos/new" class="btn btn-primary">
                            <i class="bi bi-plus-lg me-1"></i>タスクを作成
                        </a>
                    </div>

                    <div th:unless="${#lists.isEmpty(todos)}">
                        <div th:each="todo : ${todos}" class="card mb-3 shadow-sm" 
                             th:classappend="${todo.overdue} ? 'border-danger' : (${todo.dueToday} ? 'border-warning' : '')">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <!-- チェックボックス -->
                                    <div class="col-auto">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" 
                                                   th:checked="${todo.status.name()} == 'COMPLETED'"
                                                   th:data-todo-id="${todo.id}" 
                                                   onchange="toggleTodoStatus(this)">
                                        </div>
                                    </div>
                                    
                                    <!-- タスク情報 -->
                                    <div class="col">
                                        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                                            <h5 class="card-title mb-0" 
                                                th:classappend="${todo.status.name()} == 'COMPLETED' ? 'text-decoration-line-through text-muted' : ''"
                                                th:text="${todo.title}">タスクタイトル</h5>
                                            
                                            <!-- 優先度バッジ -->
                                            <span class="badge" 
                                                  th:classappend="${todo.priority.name()} == 'HIGH' ? 'bg-danger' : (${todo.priority.name()} == 'MEDIUM' ? 'bg-warning' : 'bg-secondary')"
                                                  th:text="${todo.priority.displayName}">優先度</span>
                                            
                                            <!-- 状態バッジ -->
                                            <span class="badge" 
                                                  th:classappend="${todo.status.name()} == 'COMPLETED' ? 'bg-success' : (${todo.status.name()} == 'IN_PROGRESS' ? 'bg-info' : 'bg-warning')"
                                                  th:text="${todo.status.displayName}">状態</span>
                                            
                                            <!-- 期限切れ・今日期限バッジ -->
                                            <span th:if="${todo.overdue}" class="badge bg-danger">
                                                <i class="bi bi-exclamation-triangle-fill me-1"></i>期限切れ
                                            </span>
                                            <span th:if="${todo.dueToday and !todo.overdue}" class="badge bg-warning">
                                                <i class="bi bi-clock-fill me-1"></i>今日期限
                                            </span>
                                        </div>
                                        
                                        <p class="card-text text-muted small mb-2" th:if="${todo.description}" th:text="${todo.description}">説明文</p>
                                        
                                        <div class="small text-muted">
                                            <span th:if="${todo.dueDate}">
                                                <i class="bi bi-calendar-date me-1"></i>
                                                <span th:text="${#temporals.format(todo.dueDate, 'yyyy/MM/dd')}">期限日</span>
                                            </span>
                                            <span th:if="${todo.dueDate}" class="mx-2">|</span>
                                            <i class="bi bi-clock me-1"></i>
                                            作成: <span th:text="${#temporals.format(todo.createdAt, 'MM/dd HH:mm')}">作成日時</span>
                                        </div>
                                    </div>
                                    
                                    <!-- アクションボタン -->
                                    <div class="col-auto">
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/todos/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" class="d-inline"
                                                  onsubmit="return confirm('このタスクを削除しますか？')">
                                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 共通フッター -->
    <th:block th:replace="fragments/footer :: footer"></th:block>

    <!-- JavaScript for Ajax toggle -->
    <script>
        function toggleTodoStatus(checkbox) {
            const todoId = checkbox.dataset.todoId;
            
            fetch(`/todos/${todoId}/toggle`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.text())
            .then(result => {
                if (result === 'success') {
                    location.reload(); // ページをリロードして状態を更新
                } else {
                    checkbox.checked = !checkbox.checked; // 失敗時は元に戻す
                    alert('状態の更新に失敗しました。');
                }
            })
            .catch(error => {
                checkbox.checked = !checkbox.checked; // エラー時は元に戻す
                alert('エラーが発生しました。');
            });
        }
    </script>
</body>
</html>
