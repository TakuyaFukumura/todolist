<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${todo.id != null} ? 'タスク編集' : 'タスク作成'">タスク作成</title>
    <!-- 共通CSSフラグメント -->
    <th:block th:replace="fragments/common-css :: commonCss"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- 共通ヘッダー -->
    <th:block th:replace="fragments/header :: header"></th:block>

    <!-- メインコンテンツ -->
    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h1 class="card-title h4 mb-0">
                                <i class="bi bi-plus-circle-fill me-2" th:if="${todo.id == null}"></i>
                                <i class="bi bi-pencil-fill me-2" th:if="${todo.id != null}"></i>
                                <span th:text="${todo.id != null} ? 'タスク編集' : '新しいタスク作成'">新しいタスク作成</span>
                            </h1>
                        </div>
                        <div class="card-body">
                            <form th:action="${todo.id != null} ? @{/todos/{id}(id=${todo.id})} : @{/todos}" 
                                  th:object="${todo}" 
                                  method="post" 
                                  class="needs-validation" 
                                  novalidate>
                                
                                <!-- タイトル -->
                                <div class="mb-3">
                                    <label for="title" class="form-label">
                                        <i class="bi bi-card-text me-1"></i>タスクタイトル <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="title" 
                                           th:field="*{title}"
                                           required
                                           maxlength="255"
                                           placeholder="タスクのタイトルを入力してください">
                                    <div class="invalid-feedback">
                                        タスクタイトルは必須です。
                                    </div>
                                    <div th:if="${#fields.hasErrors('title')}" class="text-danger small" th:errors="*{title}">エラーメッセージ</div>
                                </div>

                                <!-- 説明 -->
                                <div class="mb-3">
                                    <label for="description" class="form-label">
                                        <i class="bi bi-file-text me-1"></i>説明
                                    </label>
                                    <textarea class="form-control" 
                                              id="description" 
                                              th:field="*{description}"
                                              rows="3"
                                              maxlength="1000"
                                              placeholder="タスクの詳細な説明（任意）"></textarea>
                                    <div th:if="${#fields.hasErrors('description')}" class="text-danger small" th:errors="*{description}">エラーメッセージ</div>
                                </div>

                                <!-- 期限日 -->
                                <div class="mb-3">
                                    <label for="dueDate" class="form-label">
                                        <i class="bi bi-calendar-date me-1"></i>期限日
                                    </label>
                                    <input type="date" 
                                           class="form-control" 
                                           id="dueDate" 
                                           th:field="*{dueDate}"
                                           th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                                    <div th:if="${#fields.hasErrors('dueDate')}" class="text-danger small" th:errors="*{dueDate}">エラーメッセージ</div>
                                </div>

                                <!-- 優先度 -->
                                <div class="mb-3">
                                    <label for="priority" class="form-label">
                                        <i class="bi bi-exclamation-triangle me-1"></i>優先度 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" 
                                            id="priority" 
                                            th:field="*{priority}" 
                                            required>
                                        <option value="">優先度を選択してください</option>
                                        <option th:each="priority : ${priorities}" 
                                                th:value="${priority}" 
                                                th:text="${priority.displayName}"
                                                th:selected="${priority == todo.priority}">優先度</option>
                                    </select>
                                    <div class="invalid-feedback">
                                        優先度を選択してください。
                                    </div>
                                    <div th:if="${#fields.hasErrors('priority')}" class="text-danger small" th:errors="*{priority}">エラーメッセージ</div>
                                </div>

                                <!-- 状態（編集時のみ） -->
                                <div class="mb-3" th:if="${todo.id != null}">
                                    <label for="status" class="form-label">
                                        <i class="bi bi-flag me-1"></i>状態 <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" 
                                            id="status" 
                                            th:field="*{status}" 
                                            required>
                                        <option th:each="status : ${statuses}" 
                                                th:value="${status}" 
                                                th:text="${status.displayName}"
                                                th:selected="${status == todo.status}">状態</option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('status')}" class="text-danger small" th:errors="*{status}">エラーメッセージ</div>
                                </div>

                                <!-- ボタン -->
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <a href="/todos" class="btn btn-secondary me-md-2">
                                        <i class="bi bi-arrow-left me-1"></i>キャンセル
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-lg me-1" th:if="${todo.id == null}"></i>
                                        <i class="bi bi-save me-1" th:if="${todo.id != null}"></i>
                                        <span th:text="${todo.id != null} ? '更新' : '作成'">作成</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- 編集時の追加情報 -->
                    <div th:if="${todo.id != null}" class="mt-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">
                                    <i class="bi bi-info-circle me-1"></i>作成情報
                                </h6>
                                <small class="text-muted">
                                    作成日: <span th:text="${#temporals.format(todo.createdAt, 'yyyy年MM月dd日 HH:mm')}">作成日時</span><br>
                                    <span th:if="${todo.updatedAt != null and todo.updatedAt != todo.createdAt}">
                                        更新日: <span th:text="${#temporals.format(todo.updatedAt, 'yyyy年MM月dd日 HH:mm')}">更新日時</span>
                                    </span>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 共通フッター -->
    <th:block th:replace="fragments/footer :: footer"></th:block>

    <!-- Bootstrap validation -->
    <script>
        // Bootstrap validation
        (function() {
            'use strict';
            window.addEventListener('load', function() {
                var forms = document.getElementsByClassName('needs-validation');
                var validation = Array.prototype.filter.call(forms, function(form) {
                    form.addEventListener('submit', function(event) {
                        if (form.checkValidity() === false) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });
            }, false);
        })();
    </script>
</body>
</html>
